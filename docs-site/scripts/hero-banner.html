<!doctype html>
<!-- cckit docs hero banner — input for node-html-to-image-cli.
     Rendered to src/assets/hero-banner.png. Steel-cyan theme, wide + short (3:1). -->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #0e1316;
        --ink: #f1f6f7;
        --muted: #b5c0c4;
        --faint: #889399;
        --accent: #7ecdda;
        --accent-deep: #2c8fa6;
        --line: #2a3338;
        --mono: ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 1280px;
        height: 420px;
        background: var(--bg);
        background-image: radial-gradient(
          900px 420px at 88% -10%,
          rgba(126, 205, 218, 0.10),
          rgba(126, 205, 218, 0) 60%
        );
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
        position: relative;
      }
      .frame {
        position: absolute;
        inset: 0;
        padding: 64px 72px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .eyebrow {
        font-family: var(--mono);
        font-size: 15px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 22px;
      }
      .wordmark {
        font-family: var(--mono);
        font-size: 96px;
        font-weight: 600;
        letter-spacing: -0.03em;
        color: var(--ink);
        line-height: 1;
        display: flex;
        align-items: center;
      }
      .cursor {
        display: inline-block;
        width: 16px;
        height: 80px;
        margin-left: 16px;
        background: var(--accent-deep);
        border-radius: 2px;
      }
      .tagline {
        margin-top: 26px;
        font-size: 23px;
        line-height: 1.45;
        color: var(--muted);
        max-width: 760px;
        letter-spacing: -0.005em;
      }
      .cmd {
        position: absolute;
        left: 72px;
        bottom: 52px;
        font-family: var(--mono);
        font-size: 17px;
        color: var(--faint);
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .cmd .dollar { color: var(--accent); }
      .cmd .arrow { color: var(--line); }
      .cmd .step { color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="eyebrow">A project OS for coding agents</div>
      <div class="wordmark">cckit<span class="cursor"></span></div>
      <div class="tagline">
        The full GitHub work lifecycle as a CLI, drivable by Claude Code and any
        agent. Pure bash, zero hard dependencies, portable.
      </div>
    </div>
    <div class="cmd">
      <span class="dollar">$</span>
      <span>cckit start 42</span>
      <span class="arrow">&rsaquo;</span>
      <span class="step">worktree</span>
      <span class="arrow">&middot;</span>
      <span class="step">branch</span>
      <span class="arrow">&middot;</span>
      <span class="step">PR</span>
      <span class="arrow">&middot;</span>
      <span class="step">merge</span>
    </div>
  </body>
</html>
