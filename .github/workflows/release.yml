name: release

# EXPLICIT, MANUAL release — NOT triggered by merges. Merge PRs freely; nothing ships until you
# ask for it. When you're ready to cut a release, run this workflow:
#   • GitHub UI:  Actions ▸ release ▸ Run workflow
#   • CLI:        gh workflow run release.yml            (add -f dry_run=true to preview)
#
# It computes the next version from Conventional Commits since the last tag
# (scripts/lib/version-bump.sh — the same rules as `cckit release --next`), bumps the manifests,
# tags, cuts a GitHub Release, then publishes to npm + the Homebrew tap. `dry_run` prints the
# computed version and stops before tagging/publishing.
#
# Publishing is gated on secrets — a release still succeeds without them, it just skips that channel:
#   NPM_TOKEN            npm *Automation* token (bypasses 2FA). npmjs.com → Access Tokens → Automation.
#   HOMEBREW_TAP_TOKEN   PAT with push access to jeiemgi/homebrew-cckit (repo/contents:write).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview the computed version without tagging or publishing"
        type: boolean
        default: false

# The version-bump commit + tag are pushed back to main, so it needs write access.
permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history + tags for the version computation
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Compute next version (Conventional Commits)
        id: ver
        run: bash scripts/lib/version-bump.sh --emit >> "$GITHUB_OUTPUT"

      - name: Plan
        run: |
          echo "Bump: ${{ steps.ver.outputs.bump }}  →  v${{ steps.ver.outputs.next }}"
          echo "Dry run: ${{ inputs.dry_run }}"
          if [ "${{ steps.ver.outputs.bump }}" = "none" ]; then
            echo "::notice::No release-worthy commits since the last tag — nothing to release."
          fi

      - name: Tag + GitHub Release
        if: ${{ steps.ver.outputs.bump != 'none' && inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.next }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bash scripts/lib/version-bump.sh --write "$v"
          git commit -am "chore(release): v$v"
          git tag -a "v$v" -m "v$v"
          git push origin HEAD:main --follow-tags
          gh release create "v$v" --title "v$v" --generate-notes

      - name: Publish to npm
        if: ${{ steps.ver.outputs.bump != 'none' && inputs.dry_run != true && env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Bump the Homebrew tap
        if: ${{ steps.ver.outputs.bump != 'none' && inputs.dry_run != true && env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.next }}"
          url="https://github.com/${{ github.repository }}/archive/refs/tags/v$v.tar.gz"
          # The tag tarball is generated on demand right after the push — retry until it's ready.
          sha="$(curl -fsSL --retry 6 --retry-delay 5 "$url" | sha256sum | cut -d' ' -f1)"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/jeiemgi/homebrew-cckit" tap
          cd tap
          perl -0pi -e "s{url \"[^\"]*\"}{url \"$url\"}; s{sha256 \"[^\"]*\"}{sha256 \"$sha\"}" Formula/cckit.rb
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "cckit $v"
          git push
